<div class="page">

  <!-- Header ? -->
  <header class="header">
    <span class="header-logo">THM Connect</span>
  </header>

  <!-- Content -->
  <div class="content">
    <div class="register-wrapper">

      <!-- Stepper -->
      <div class="stepper">
        <div class="stepper-labels">
          <span class="label">Benutzername wählen</span>
          <span class="label">Passwort setzen</span>
          <span class="label">E-Mail setzen</span>
          <span class="label active">Profil</span>
        </div>
        <div class="stepper-circles">
          <!-- Step 1 -->
          <div class="step">
            <div class="circle done">1</div>
            <div class="line"></div>
          </div>
          <!-- Step 2 -->
          <div class="step">
            <div class="circle done">2</div>
            <div class="line"></div>
          </div>
          <!-- Step 3 -->
          <div class="step">
            <div class="circle done">3</div>
            <div class="line"></div>
          </div>
          <!-- Step 4 -->
          <div class="step">
            <div class="circle active">4</div>
          </div>
        </div>
      </div>

      <!-- Card -->
      <div class="card">
        <h2 class="card-title">Erzähl uns von dir</h2>
        <p class="card-subtitle">Optional</p>

        <form [formGroup]="form">
          <div class="input-group">
            <label class="input-label">Titel</label>
            <input
              type="text"
              placeholder="z.B. Student, Professor..."
              class="text-input"
              formControlName="title"
              [class.input-error]="form.get('title')?.invalid && form.get('title')?.touched"
            />
            @if (form.get('title')?.invalid && form.get('title')?.touched) {
              <span class="error-message">* Titel ist erforderlich</span>
            }
          </div>

          <div class="input-group">
            <label class="input-label">Beschreibung</label>
            <textarea
              placeholder="Erzähl etwas über dich..."
              class="text-area"
              formControlName="description"
            ></textarea>
          </div>
        </form>

        <div class="button-group">
          <button class="btn btn-secondary" (click)="back()" [disabled]="isLoading">Zurück</button>
          <button class="btn btn-secondary" (click)="skip()" [disabled]="isLoading">Überspringen</button>
          <button class="btn btn-primary" (click)="finalize()" [disabled]="isLoading">
            @if (isLoading) {
              <span class="spinner"></span>
            } @else {
              Abschließen
            }
          </button>
        </div>
      </div>

    </div>
  </div>

</div>
