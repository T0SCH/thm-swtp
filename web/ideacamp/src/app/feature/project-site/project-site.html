<div class="min-h-screen bg-slate-100 text-slate-700">

  @if (isLoading()) {
    <div class="flex items-center justify-center py-20">
      <p class="text-slate-500">Projekt wird geladen…</p>
    </div>
  }

  @if (!isLoading() && errorMessage()) {
    <div class="mx-auto max-w-6xl px-6 py-10">
      <div class="rounded-xl bg-red-50 border border-red-200 p-6 text-red-700">
        <p class="font-semibold">Fehler</p>
        <p class="mt-1 text-sm">{{ errorMessage() }}</p>
      </div>
    </div>
  }
  @if (!isLoading() && project()){
    <app-project-header />
  <main class="mx-auto grid max-w-6xl grid-cols-1 gap-6 px-6 py-10 lg:grid-cols-[1fr_320px]">
    <section class="space-y-6">
      <app-info-card />
      <app-open-position-card />
    </section>

    <app-sidebar />
  </main>
  }
</div>
