<header class="flex justify-center border-b border-gray-300 py-2">
  <div class="flex justify-between container items-center">

    <div class="flex flex-1 gap-4 items-center">
      <button>
        <i class="pi pi-bars text-xl text-black"> </i>
      </button>

      <app-logo/>
    </div>

    <nav>
      <app-feature>
        <i class="pi pi-home text-md"></i>
        Home
      </app-feature>
      <app-feature>
        <i class="pi pi-compass text-md"></i>
        Explore
      </app-feature>
    </nav>

    <div class="flex justify-end flex-1">
      <!-- Example of conditional rendering based on authentication state. -->
      @if (true) {
        <div class="flex gap-4 text-sm">
          <button class="">
            <i class="pi pi-bell text-xl"></i>
          </button>
          <div class="flex items-center gap-2">
            <div class="flex flex-col items-end">
              <div class="font-semibold"> User name</div>
              <div class="status text-xs"> Eingellogt</div>
            </div>
            <div class="rounded-full user size-12 flex justify-center items-center bg-green-400">
             <i class="pi pi-user text-xl"></i>
            </div>
          </div>
        </div>
      } @else {
        <div class="flex gap-1 items-center">
          <button class="flex gap-2 items-center border border-white hover:border-black transition duration-300 px-4 py-2 rounded-xl">
            <i class="pi pi-sign-out"></i>
            Sign in
          </button>
          <button class="bg-green-400 py-2 px-4 rounded-xl flex gap-2 items-center hover:bg-green-500 transition duration-300">
            <i class="pi pi-user-plus" ></i>
            Sign Up
          </button>
        </div>
      }

    </div>

  </div>


</header>
